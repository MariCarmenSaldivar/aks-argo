apiVersion: batch/v1
kind: CronJob
metadata:
  name: mydumper
  namespace: backup-jobs
  labels:
    app.kubernetes.io/name: mydumper-cronjob
spec:
  schedule: "0 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  concurrencyPolicy: Forbid
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/name: mydumper-cronjob
        spec:
          serviceAccountName: mydumper
          restartPolicy: OnFailure
          containers:
            - name: mydumper
              image: mydumper/mydumper:latest
              imagePullPolicy: IfNotPresent
              command:
                - /bin/sh
                - /scripts/run-backup.sh
              env:
                - name: BACKUP_ROOT_DIR
                  value: /backup
                - name: BACKUP_RETENTION_COUNT
                  value: "7"
                - name: MYDUMPER_THREADS
                  value: "4"
              volumeMounts:
                - name: backup-blob-storage
                  mountPath: /backup
                - name: mydumper-config
                  mountPath: /etc/mydumper
                  readOnly: true
                - name: scripts
                  mountPath: /scripts
                  readOnly: true
          volumes:
            - name: backup-blob-storage
              persistentVolumeClaim:
                claimName: mydumper-backups
            - name: mydumper-config
              secret:
                secretName: mydumper-config
            - name: scripts
              configMap:
                name: mydumper-scripts
                defaultMode: 0755
